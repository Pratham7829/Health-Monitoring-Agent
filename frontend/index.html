<!DOCTYPE html>
<html>
<head>
    <title>Health Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧠 Health Monitoring Agent</h1>

    <div class="main">

        <!-- 🔵 LEFT PANEL (INPUT) -->
        <div class="left-panel">

            <h2>Enter Patient Data</h2>

            <input type="text" id="patientId" placeholder="Patient ID (e.g. p1)">
            <input type="number" id="bp" placeholder="Blood Pressure">
            <input type="number" id="sugar" placeholder="Sugar Level">
            <input type="number" id="heartRate" placeholder="Heart Rate">

            <button onclick="submitForm()">Analyze</button>

            <!-- Loading -->
            <div id="loading">⏳ Analyzing...</div>

            <!-- Prompt Button -->
            <button onclick="togglePrompt()" style="margin-top:15px;">
                View Agent Prompt
            </button>

        </div>

        <!-- 🟢 RIGHT PANEL (OUTPUT) -->
        <div class="right-panel">

            <h2>Analysis Dashboard</h2>

            <div id="result">
                <p style="color:gray;">Results will appear here...</p>
            </div>

        </div>

    </div>

    <!-- 🔥 Floating Prompt Box -->
    <div id="promptBox" class="popup"></div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
