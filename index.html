<!DOCTYPE html>
<html>
<head>
    <title>Health Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🧠 Health Monitoring Agent</h1>

    <div class="main">

        <!-- 🔵 LEFT PANEL (INPUT) -->
        <div class="left-panel">

            <h2>Enter Patient Data</h2>

            <p style="font-size:13px; color:#777;">
                Enter patient vitals to analyze health risk
            </p>

            <input type="text" id="patientId" placeholder="Patient ID (e.g. p1)">
            <input type="number" id="bp" placeholder="Blood Pressure">
            <input type="number" id="sugar" placeholder="Sugar Level">
            <input type="number" id="heartRate" placeholder="Heart Rate">

            <!-- 🔥 Analyze Button (with ID fix) -->
            <button id="analyzeBtn" onclick="submitForm()">Analyze</button>

            <!-- 🔥 Loading -->
            <div id="loading" style="display:none; margin-top:10px; font-weight:600; color:#555;">
                ⏳ Analyzing...
            </div>

            <!-- 🔥 Prompt Button -->
            <button id="promptBtn" onclick="togglePrompt()" style="margin-top:15px;">
                View Agent Prompt
            </button>

        </div>

        <!-- 🟢 RIGHT PANEL (OUTPUT) -->
        <div class="right-panel">

            <h2>Analysis Dashboard</h2>

            <!-- 🔥 Result Area -->
            <div id="result" style="min-height:120px;">
                <p style="color:gray;">Results will appear here...</p>
            </div>

        </div>

    </div>

    <!-- 🔥 Floating Prompt Box -->
    <div id="promptBox" class="popup"></div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
